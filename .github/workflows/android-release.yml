name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*' # Triggers when you push a tag like v1.0.0, v1.1, etc.
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Build APK & Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required permission to upload release assets

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Find and Rename APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: APK not found!"
            exit 1
          fi
          echo "Found APK at: $APK_PATH"
          
          # Determine the tag or event name
          TAG_NAME="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="manual-build"
          fi
          
          # Copy to a clean, descriptive filename for release
          NEW_APK_NAME="SonicMusicPlayer-$TAG_NAME.apk"
          cp "$APK_PATH" "$NEW_APK_NAME"
          echo "APK_NAME=$NEW_APK_NAME" >> $GITHUB_ENV
          echo "Created release artifact: $NEW_APK_NAME"

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.APK_NAME }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Also save the APK as a workflow run artifact for easy download during manual builds
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonic-music-player-apk
          path: ${{ env.APK_NAME }}
